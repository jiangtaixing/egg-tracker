<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸡蛋消耗记录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --counter: #F7F4F0;
            --tray: #EBE7E2;
            --tray-border: #D6D1CB;
            --egg-light: #FFF5E6;
            --egg-mid: #F2DFC4;
            --egg-dark: #E0C9A8;
            --text: #3D3632;
            --text-muted: #8A7E76;
            --accent: #C4553A;
            --indent: #DDD8D2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--counter);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text);
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-family: 'LXGW WenKai', cursive;
            font-weight: 400;
            font-size: 1.6rem;
            letter-spacing: 0.05em;
            color: var(--text);
            margin-bottom: 8px;
        }

        .header .meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            gap: 16px;
            justify-content: center;
            align-items: baseline;
        }

        .header .meta .count {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
            font-family: 'LXGW WenKai', cursive;
        }

        /* The tray */
        .tray {
            background: var(--tray);
            border: 1px solid var(--tray-border);
            border-radius: 6px;
            padding: 14px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 4px;
            box-shadow:
                0 1px 2px rgba(0,0,0,0.06),
                0 4px 12px rgba(0,0,0,0.04);
            position: relative;
        }

        /* The label sticker */
        .tray::after {
            content: '';
            position: absolute;
            top: 8px;
            right: 8px;
            width: 48px;
            height: 56px;
            background: rgba(255,255,255,0.7);
            border-radius: 2px;
            border: 1px solid rgba(0,0,0,0.06);
            pointer-events: none;
        }

        .cell {
            width: 66px;
            height: 66px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Molded indent */
        .cell::before {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            background: var(--indent);
            box-shadow:
                inset 0 2px 4px rgba(0,0,0,0.08),
                inset 0 -1px 2px rgba(255,255,255,0.6);
        }

        .cell:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        /* The egg */
        .egg {
            position: relative;
            z-index: 1;
            width: 46px;
            height: 56px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            background: radial-gradient(ellipse at 30% 25%, var(--egg-light), var(--egg-mid) 50%, var(--egg-dark) 100%);
            box-shadow:
                1px 3px 6px rgba(0,0,0,0.12),
                inset -1px -2px 4px rgba(0,0,0,0.04),
                inset 2px 2px 3px rgba(255,255,255,0.7);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
            transform: scale(1);
            opacity: 1;
        }

        .cell.empty .egg {
            transform: scale(0);
            opacity: 0;
        }

        /* Wobble on tap */
        @keyframes wobble {
            0% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(0.95) rotate(-3deg); }
            50% { transform: scale(1.02) rotate(2deg); }
            75% { transform: scale(0.98) rotate(-1deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .cell.tapped .egg {
            animation: wobble 0.4s ease;
        }

        @media (prefers-reduced-motion: reduce) {
            .egg { transition: opacity 0.2s ease; }
            .cell.tapped .egg { animation: none; }
        }

        /* Actions */
        .actions {
            margin-top: 24px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid var(--tray-border);
            border-radius: 4px;
            background: transparent;
            font-size: 0.8rem;
            color: var(--text);
            cursor: pointer;
            transition: background 0.15s ease, border-color 0.15s ease;
            font-family: 'LXGW WenKai', cursive;
            letter-spacing: 0.03em;
        }

        .btn:hover {
            background: var(--tray);
            border-color: var(--text-muted);
        }

        .btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .btn-primary {
            background: var(--text);
            color: var(--counter);
            border-color: var(--text);
        }

        .btn-primary:hover {
            background: #2a2320;
        }

        .btn-danger {
            color: var(--accent);
            border-color: var(--accent);
        }

        .btn-danger:hover {
            background: rgba(196, 85, 58, 0.06);
        }

        /* History */
        .history {
            margin-top: 40px;
            width: 100%;
            max-width: 460px;
        }

        .history-title {
            font-family: 'LXGW WenKai', cursive;
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--tray-border);
        }

        .history-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            font-size: 0.8rem;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-item .label {
            color: var(--text);
        }

        .history-item .consumed {
            font-weight: 700;
            color: var(--accent);
            font-family: 'LXGW WenKai', cursive;
        }

        .history-item .dates {
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        /* Sync indicator */
        .sync-bar {
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .sync-bar .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #bbb;
        }

        .sync-bar .dot.connected { background: #5cb85c; }
        .sync-bar .dot.syncing { background: #f0ad4e; animation: pulse 1s infinite; }
        .sync-bar .dot.error { background: var(--accent); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .sync-bar button {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 0.75rem;
            text-decoration: underline;
            font-family: inherit;
        }

        .sync-bar .btn-refresh {
            color: var(--text-muted);
            text-decoration: none;
            padding: 2px 6px;
            border: 1px solid var(--tray-border);
            border-radius: 3px;
            transition: border-color 0.15s;
        }

        .sync-bar .btn-refresh:hover {
            border-color: var(--text-muted);
        }

        .sync-bar .btn-refresh.spinning {
            animation: spin 0.6s linear;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Settings modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: var(--counter);
            border: 1px solid var(--tray-border);
            border-radius: 8px;
            padding: 28px 24px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }

        .modal h3 {
            font-family: 'LXGW WenKai', cursive;
            font-weight: 400;
            font-size: 1.1rem;
            margin-bottom: 16px;
        }

        .modal label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .modal input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--tray-border);
            border-radius: 4px;
            font-size: 0.8rem;
            background: white;
            color: var(--text);
            margin-bottom: 12px;
        }

        .modal input:focus {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
        }

        .modal .hint {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .modal .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--text);
            color: var(--counter);
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-family: 'LXGW WenKai', cursive;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 100;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 480px) {
            body { padding: 24px 12px; }
            .cell { width: 52px; height: 52px; }
            .egg { width: 36px; height: 44px; }
            .tray { gap: 3px; padding: 10px; }
            .tray::after { display: none; }
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>鸡蛋</h1>
        <div class="meta">
            <span>第 <span id="boxNum">1</span> 盒</span>
            <span>剩余 <span class="count" id="remaining">30</span></span>
            <span>累计吃掉 <span id="totalConsumed">0</span></span>
        </div>
    </header>

    <div class="tray" id="eggBox" role="grid" aria-label="鸡蛋托盘，5行6列"></div>

    <div class="actions">
        <button class="btn btn-primary" onclick="newBox()">开新一盒</button>
        <button class="btn" onclick="fillAll()">装满</button>
        <button class="btn btn-danger" onclick="clearAll()">清空</button>
    </div>

    <section class="history" id="historySection" style="display:none;" aria-label="历史记录">
        <h2 class="history-title">往期</h2>
        <ul class="history-list" id="historyList"></ul>
    </section>

    <div class="sync-bar" id="syncBar">
        <span class="dot" id="syncDot"></span>
        <span id="syncStatus">仅本地存储</span>
        <button class="btn-refresh" id="btnRefresh" onclick="manualPull()" title="从云端刷新" style="display:none;">↻</button>
        <button onclick="openSettings()">设置云同步</button>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeSettings(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <h3>云同步设置</h3>
            <label for="tokenInput">GitHub Personal Access Token</label>
            <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
            <p class="hint">
                前往 GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic)<br>
                创建一个仅勾选 <strong>gist</strong> 权限的 Token。Token 存于本地，不会上传到你的仓库。
            </p>
            <label for="gistIdInput">Gist ID（留空则自动创建）</label>
            <input type="text" id="gistIdInput" placeholder="可选，已有 Gist 则填入 ID">
            <div class="modal-actions">
                <button class="btn" onclick="closeSettings()">取消</button>
                <button class="btn btn-primary" onclick="saveSyncSettings()">保存并同步</button>
                <button class="btn btn-danger" onclick="disconnectSync()">断开</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
        const ROWS = 5;
        const COLS = 6;
        const TOTAL = ROWS * COLS;
        const STORAGE_KEY = 'egg-tracker-data';
        const SYNC_KEY = 'egg-tracker-sync';
        const GIST_FILENAME = 'egg-tracker-data.json';

        let data = loadData();
        let syncConfig = loadSyncConfig();

        // --- Data persistence (local) ---

        function getDefaultData() {
            return {
                currentBox: {
                    eggs: new Array(TOTAL).fill(true),
                    startDate: new Date().toLocaleDateString('zh-CN')
                },
                history: [],
                totalConsumed: 0,
                lastModified: Date.now()
            };
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (parsed && parsed.currentBox && Array.isArray(parsed.currentBox.eggs)) {
                        if (!parsed.lastModified) parsed.lastModified = Date.now();
                        return parsed;
                    }
                } catch (e) {}
            }
            return getDefaultData();
        }

        function saveData() {
            data.lastModified = Date.now();
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            debouncedSync();
        }

        // --- Gist cloud sync ---

        function loadSyncConfig() {
            const saved = localStorage.getItem(SYNC_KEY);
            if (saved) {
                try { return JSON.parse(saved); } catch (e) {}
            }
            return { token: '', gistId: '' };
        }

        function saveSyncConfig() {
            localStorage.setItem(SYNC_KEY, JSON.stringify(syncConfig));
        }

        let syncTimer = null;
        function debouncedSync() {
            if (!syncConfig.token || !syncConfig.gistId) return;
            clearTimeout(syncTimer);
            syncTimer = setTimeout(() => pushToGist(), 2000);
        }

        function setSyncUI(state, text) {
            const dot = document.getElementById('syncDot');
            const status = document.getElementById('syncStatus');
            dot.className = 'dot ' + state;
            status.textContent = text;
        }

        async function pushToGist() {
            if (!syncConfig.token || !syncConfig.gistId) return;
            setSyncUI('syncing', '同步中…');
            try {
                const res = await fetch(`https://api.github.com/gists/${syncConfig.gistId}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${syncConfig.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: {
                            [GIST_FILENAME]: {
                                content: JSON.stringify(data, null, 2)
                            }
                        }
                    })
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                setSyncUI('connected', '已同步');
            } catch (e) {
                setSyncUI('error', '同步失败');
                console.error('Gist push error:', e);
            }
        }

        async function pullFromGist() {
            if (!syncConfig.token || !syncConfig.gistId) return;
            setSyncUI('syncing', '拉取中…');
            try {
                const res = await fetch(`https://api.github.com/gists/${syncConfig.gistId}?t=${Date.now()}`, {
                    headers: {
                        'Authorization': `token ${syncConfig.token}`
                    }
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const gist = await res.json();
                const file = gist.files[GIST_FILENAME];
                if (file && file.content) {
                    const remote = JSON.parse(file.content);
                    if (remote && remote.currentBox && Array.isArray(remote.currentBox.eggs)) {
                        const remoteTime = remote.lastModified || 0;
                        const localTime = data.lastModified || 0;
                        if (remoteTime > localTime) {
                            // 云端更新，覆盖本地
                            data = remote;
                            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                            render();
                            setSyncUI('connected', '已同步');
                            showToast('已从云端更新');
                            return;
                        } else if (localTime > remoteTime) {
                            // 本地更新，推送到云端
                            setSyncUI('connected', '已同步');
                            await pushToGist();
                            return;
                        }
                        // 时间相同，无需操作
                        setSyncUI('connected', '已同步');
                        return;
                    }
                }
                // Gist 无数据，推送当前
                await pushToGist();
            } catch (e) {
                setSyncUI('error', '拉取失败');
                console.error('Gist pull error:', e);
            }
        }

        async function createGist() {
            setSyncUI('syncing', '创建 Gist…');
            try {
                const res = await fetch('https://api.github.com/gists', {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${syncConfig.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        description: 'Egg Tracker Data',
                        public: false,
                        files: {
                            [GIST_FILENAME]: {
                                content: JSON.stringify(data, null, 2)
                            }
                        }
                    })
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const gist = await res.json();
                syncConfig.gistId = gist.id;
                saveSyncConfig();
                document.getElementById('gistIdInput').value = gist.id;
                setSyncUI('connected', '已同步');
                showToast('Gist 已创建并同步');
            } catch (e) {
                setSyncUI('error', '创建失败');
                console.error('Gist create error:', e);
            }
        }

        // --- Settings modal ---

        function openSettings() {
            document.getElementById('tokenInput').value = syncConfig.token;
            document.getElementById('gistIdInput').value = syncConfig.gistId;
            document.getElementById('modalOverlay').classList.add('open');
        }

        function closeSettings(e) {
            if (e && e.target !== e.currentTarget) return;
            document.getElementById('modalOverlay').classList.remove('open');
        }

        async function saveSyncSettings() {
            const token = document.getElementById('tokenInput').value.trim();
            const gistId = document.getElementById('gistIdInput').value.trim();

            if (!token) {
                showToast('请填入 Token');
                return;
            }

            syncConfig.token = token;
            syncConfig.gistId = gistId;
            saveSyncConfig();
            closeSettings();
            document.getElementById('btnRefresh').style.display = '';

            if (gistId) {
                await pullFromGist();
            } else {
                await createGist();
            }

            // 启动轮询
            setInterval(() => {
                if (syncConfig.token && syncConfig.gistId) {
                    pullFromGist();
                }
            }, 30000);
        }

        function disconnectSync() {
            syncConfig = { token: '', gistId: '' };
            saveSyncConfig();
            setSyncUI('', '仅本地存储');
            document.getElementById('btnRefresh').style.display = 'none';
            closeSettings();
            showToast('已断开云同步');
        }

        // --- UI rendering ---

        function updateStats() {
            const remaining = data.currentBox.eggs.filter(e => e).length;
            document.getElementById('remaining').textContent = remaining;
            document.getElementById('boxNum').textContent = data.history.length + 1;
            document.getElementById('totalConsumed').textContent = data.totalConsumed;
        }

        function render() {
            const box = document.getElementById('eggBox');
            box.innerHTML = '';
            for (let i = 0; i < TOTAL; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell' + (data.currentBox.eggs[i] ? '' : ' empty');
                cell.innerHTML = '<div class="egg"></div>';
                cell.addEventListener('click', () => toggleEgg(i, cell));
                cell.setAttribute('role', 'button');
                cell.setAttribute('tabindex', '0');
                cell.setAttribute('aria-label', `位置${i + 1}，${data.currentBox.eggs[i] ? '有蛋，点击取出' : '空位，点击放入'}`);
                cell.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        toggleEgg(i, cell);
                    }
                });
                box.appendChild(cell);
            }
            updateStats();
            renderHistory();
        }

        function toggleEgg(index, cell) {
            const wasPresent = data.currentBox.eggs[index];
            data.currentBox.eggs[index] = !wasPresent;

            if (wasPresent) {
                data.totalConsumed++;
            } else {
                data.totalConsumed = Math.max(0, data.totalConsumed - 1);
            }

            if (wasPresent) {
                cell.classList.add('tapped');
                setTimeout(() => cell.classList.remove('tapped'), 400);
            }

            saveData();
            render();
        }

        function fillAll() {
            const emptyCount = data.currentBox.eggs.filter(e => !e).length;
            data.currentBox.eggs = new Array(TOTAL).fill(true);
            data.totalConsumed = Math.max(0, data.totalConsumed - emptyCount);
            saveData();
            render();
        }

        function clearAll() {
            const fullCount = data.currentBox.eggs.filter(e => e).length;
            data.currentBox.eggs = new Array(TOTAL).fill(false);
            data.totalConsumed += fullCount;
            saveData();
            render();
        }

        function newBox() {
            const consumed = data.currentBox.eggs.filter(e => !e).length;
            if (consumed === 0) {
                showToast('这盒还没动过');
                return;
            }

            data.history.push({
                boxNumber: data.history.length + 1,
                consumed: consumed,
                startDate: data.currentBox.startDate,
                endDate: new Date().toLocaleDateString('zh-CN')
            });

            data.currentBox = {
                eggs: new Array(TOTAL).fill(true),
                startDate: new Date().toLocaleDateString('zh-CN')
            };

            saveData();
            render();
            showToast('新一盒已开启');
        }

        function renderHistory() {
            const section = document.getElementById('historySection');
            const list = document.getElementById('historyList');

            if (data.history.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            list.innerHTML = '';

            [...data.history].reverse().forEach(item => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `
                    <span class="label">第 ${item.boxNumber} 盒</span>
                    <span class="consumed">${item.consumed} 枚</span>
                    <span class="dates">${item.startDate} — ${item.endDate}</span>
                `;
                list.appendChild(li);
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // --- Init ---
        render();
        if (syncConfig.token && syncConfig.gistId) {
            document.getElementById('btnRefresh').style.display = '';
            setSyncUI('syncing', '同步中…');
            pullFromGist();
            // 每 30 秒自动拉取云端数据
            setInterval(() => {
                if (syncConfig.token && syncConfig.gistId) {
                    pullFromGist();
                }
            }, 30000);
        }

        async function manualPull() {
            const btn = document.getElementById('btnRefresh');
            btn.classList.add('spinning');
            await pullFromGist();
            setTimeout(() => btn.classList.remove('spinning'), 600);
        }
    </script>
</body>
</html>
